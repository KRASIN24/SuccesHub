<header class="topbar">
  <div class="topbar-left">
    @if (!sidebarOpen()) {
      <button
        type="button"
        class="icon-btn menu-btn"
        (click)="onMenuToggle()"
        aria-label="Open navigation"
      >
        <span class="material-icons">menu</span>
      </button>
    }
    <a class="brand" routerLink="/dashboard">SUCCESSHUB</a>
  </div>

  <div class="topbar-right">
    <div class="stat-chip">
      <span class="stat-key">XP:</span>
      <span class="stat-val gold">{{ stats.xp }}</span>
    </div>
    <div class="stat-chip rank">
      <span class="stat-key">RANK:</span>
      <span class="stat-val">{{ stats.rank }}</span>
    </div>

    <button type="button" class="icon-btn" aria-label="Notifications">
      <span class="material-icons">notifications_none</span>
      <span class="dot" aria-hidden="true"></span>
    </button>
    <button type="button" class="avatar-btn" aria-label="Account">
      <span class="material-icons">person</span>
    </button>
  </div>
</header>
