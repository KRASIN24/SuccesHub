<mat-toolbar class="navbar">
  <button mat-icon-button class="menu-btn" aria-label="Toggle menu" (click)="onMenuToggle()">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="brand">
    <mat-icon class="brand-icon">rocket_launch</mat-icon>
    <span class="brand-name">SuccesHub</span>
  </span>

  <span class="spacer"></span>

  <button mat-icon-button aria-label="Notifications">
    <mat-icon>notifications_none</mat-icon>
  </button>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" class="avatar-btn" aria-label="User menu">
    @if (authService.currentUser()?.avatarUrl) {
      <img [src]="authService.currentUser()!.avatarUrl" [alt]="authService.currentUser()!.name" class="avatar-img" />
    } @else {
      <span class="avatar-initials">{{ authService.userInitials() || 'U' }}</span>
    }
  </button>

  <mat-menu #userMenu="matMenu" xPosition="before">
    <div class="user-menu-header">
      <span class="user-name">{{ authService.currentUser()?.name || 'Guest' }}</span>
      <span class="user-email">{{ authService.currentUser()?.email || '' }}</span>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item>
      <mat-icon>person_outline</mat-icon>
      <span>Profile</span>
    </button>
    <button mat-menu-item>
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="authService.logout()">
      <mat-icon>logout</mat-icon>
      <span>Sign out</span>
    </button>
  </mat-menu>
</mat-toolbar>
