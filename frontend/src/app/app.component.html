<div class="app-shell" [class.nav-closed]="!sidenavOpen()">
  <app-sidebar [collapsed]="!sidenavOpen()" (closeRequested)="closeSidenav()"></app-sidebar>

  <div class="app-backdrop" (click)="closeSidenav()"></div>

  <div class="app-main">
    <app-navbar [sidebarOpen]="sidenavOpen()" (menuToggled)="toggleSidenav()"></app-navbar>
    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
